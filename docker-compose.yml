services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: regimeiq_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-regimeiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-regimeiq}
      POSTGRES_DB: ${POSTGRES_DB:-regimeiq}
    ports:
      - "5433:5432"
    volumes:
      - regimeiq_pgdata:/var/lib/postgresql/data
      - ./storage/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-regimeiq}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: regimeiq_redis
    ports:
      - "6379:6379"
    volumes:
      - regimeiq_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: regimeiq_etl
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

volumes:
  regimeiq_pgdata:
  regimeiq_redisdata: