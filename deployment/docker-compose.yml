services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: vektor-postgres
    environment:
      POSTGRES_USER: vektor
      POSTGRES_PASSWORD: vektor
      POSTGRES_DB: vektor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vektor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vektor-net

  redis:
    image: redis:7-alpine
    container_name: vektor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - vektor-net

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: vektor-app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: vektor
      POSTGRES_PASSWORD: vektor
      POSTGRES_DB: vektor
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    networks:
      - vektor-net

  nginx:
    image: nginx:alpine
    container_name: vektor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - vektor-net

volumes:
  postgres_data:
  redis_data:
  nginx_ssl:

networks:
  vektor-net:
    driver: bridge