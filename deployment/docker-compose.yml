services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: regimeiq-postgres
    environment:
      POSTGRES_USER: regimeiq
      POSTGRES_PASSWORD: regimeiq
      POSTGRES_DB: regimeiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regimeiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - regimeiq-net

  redis:
    image: redis:7-alpine
    container_name: regimeiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - regimeiq-net

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: regimeiq-app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: regimeiq
      POSTGRES_PASSWORD: regimeiq
      POSTGRES_DB: regimeiq
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    networks:
      - regimeiq-net

volumes:
  postgres_data:
  redis_data:

networks:
  regimeiq-net:
    driver: bridge