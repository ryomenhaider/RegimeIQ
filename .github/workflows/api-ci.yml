name: API CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'api/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vektor
          POSTGRES_PASSWORD: vektor
          POSTGRES_DB: vektor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --cov=api --cov-fail-under=90
        env:
          POSTGRES_DSN: postgresql://vektor:vektor@localhost:5433/vektor_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          ENVIRONMENT: test

      - name: Run security scan
        run: uv run bandit -r api/ -ll --exit-zero=False

      - name: Check dependencies
        run: uv run pip-audit || true

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vektor
          POSTGRES_PASSWORD: vektor
          POSTGRES_DB: vektor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
        env:
          POSTGRES_DSN: postgresql://vektor:vektor@localhost:5433/vektor_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          ENVIRONMENT: test

  full-suite:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [test, integration]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: vektor
          POSTGRES_PASSWORD: vektor
          POSTGRES_DB: vektor_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run all tests
        run: uv run pytest tests/ -v --cov=api --cov-fail-under=90
        env:
          POSTGRES_DSN: postgresql://vektor:vektor@localhost:5433/vektor_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          ENVIRONMENT: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests